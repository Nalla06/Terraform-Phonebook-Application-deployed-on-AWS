<!DOCTYPE html>
<html>
<head>
<title>Add / Update Person</title>
</head>

<body>

<h2>{{ action }} Person</h2>

<form method="post">

<label>Name</label><br>

<input type="text" name="name" value="{{ person[1] if person else '' }}">

<br><br>

<label>Phone Number</label><br>

<input type="text" name="number" value="{{ person[2] if person else '' }}">

<br><br>

<button type="submit">Submit</button>

</form>

<br>

<a href="/">Back</a>

</body>
</html>
