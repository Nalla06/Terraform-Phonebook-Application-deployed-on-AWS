<!DOCTYPE html>
<html>
<head>
    <title>Phonebook Application</title>
</head>

<body>

<h1>Phonebook Application</h1>

<p>Developer: {{ developer_name }}</p>

<hr>

<h2>Search Person</h2>

<form action="/search" method="post">
    <input type="text" name="keyword" placeholder="Enter name">
    <button type="submit">Search</button>
</form>

<br>

<a href="/add">Add New Person</a>

<hr>

{% if show_result %}

<h2>Search Results</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Actions</th>
</tr>

{% for person in persons %}

<tr>
<td>{{ person[0] }}</td>
<td>{{ person[1] }}</td>
<td>{{ person[2] }}</td>

<td>

<a href="/update/{{ person[0] }}">Update</a>

<a href="/delete/{{ person[0] }}">Delete</a>

</td>

</tr>

{% endfor %}

</table>

{% endif %}

{% if msg %}

<p>{{ msg }}</p>

{% endif %}

</body>
</html>
